<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Lifecycle Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root { --grenadine:#D44720; --cream:#F5EFE4; --dark:#1e1710; --beeswax:#E9A752; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:48px 44px;width:100%;max-width:400px;text-align:center;}
    .logo{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--cream);margin-bottom:4px;}
    .logo span{color:var(--grenadine);}
    .tagline{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:36px;}
    .divider{height:1px;background:rgba(255,255,255,0.08);margin:28px 0;}
    .sign-in-btn{width:100%;padding:13px 20px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);color:var(--cream);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.06em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.18s;}
    .sign-in-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);}
    .sign-in-btn svg{flex-shrink:0;}
    .loading{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:rgba(255,255,255,0.3);margin-top:20px;display:none;}
    .error{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--grenadine);margin-top:16px;display:none;}
    .footer{font-size:11px;color:rgba(255,255,255,0.18);margin-top:28px;}
  </style>
</head>
<body>

<div class="card">
  <div class="logo">Lifecycle<span>.</span></div>
  <div class="tagline">Winery Operations Manager</div>

  <div id="clerk-mount"></div>

  <div class="divider"></div>

  <button class="sign-in-btn" id="google-btn" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>

  <div class="loading" id="loading">Signing you in…</div>
  <div class="error" id="error-msg"></div>

  <div class="footer">Access restricted to authorized team members.</div>
</div>

<!-- Clerk JS SDK -->
<script>
  // Your Clerk publishable key — replace with yours from clerk.com dashboard
  const CLERK_PUBLISHABLE_KEY = 'pk_test_c21vb3RoLXN0YWxsaW9uLTkzLmNsZXJrLmFjY291bnRzLmRldiQ';

  async function loadClerk() {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
    script.setAttribute('data-clerk-publishable-key', CLERK_PUBLISHABLE_KEY);
    document.head.appendChild(script);

    await new Promise(resolve => script.onload = resolve);
    await window.Clerk.load();

    // If already signed in, redirect to app
    if (window.Clerk.user) {
      window.location.href = '/Vineyard_1.2.html';
    }
  }

  async function signInWithGoogle() {
    document.getElementById('google-btn').disabled = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
    try {
      await window.Clerk.signIn.authenticateWithRedirect({
        strategy: 'oauth_google',
        redirectUrl: '/sso-callback.html',
        redirectUrlComplete: '/Vineyard_1.2.html',
      });
    } catch(err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('google-btn').disabled = false;
      document.getElementById('error-msg').textContent = err.message || 'Sign-in failed. Try again.';
      document.getElementById('error-msg').style.display = 'block';
    }
  }

  loadClerk();
</script>
</body>
</html>
