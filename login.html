<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Lifecycle Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root { --grenadine:#D44720; --cream:#F5EFE4; --dark:#1e1710; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:48px 44px;width:100%;max-width:420px;text-align:center;}
    .logo{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--cream);margin-bottom:4px;}
    .logo span{color:var(--grenadine);}
    .tagline{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:28px;}
    .divider{height:1px;background:rgba(255,255,255,0.08);margin-bottom:28px;}
    #clerk-sign-in{min-height:60px;}
    .loading-msg{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:rgba(255,255,255,0.25);letter-spacing:0.1em;text-transform:uppercase;padding:20px 0;}
    .footer{font-size:11px;color:rgba(255,255,255,0.18);margin-top:24px;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Lifecycle<span>.</span></div>
  <div class="tagline">Winery Operations Manager</div>
  <div class="divider"></div>
  <div id="clerk-sign-in">
    <div class="loading-msg">Loading...</div>
  </div>
  <div class="footer">Access restricted to authorized team members.</div>
</div>
<script>
  const CLERK_PK = 'pk_test_c21vb3RoLXN0YWxsaW9uLTkzLmNsZXJrLmFjY291bnRzLmRldiQ';
  (async () => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
    s.setAttribute('data-clerk-publishable-key', CLERK_PK);
    document.head.appendChild(s);
    await new Promise(r => { s.onload = r; s.onerror = r; });
    await window.Clerk.load();
    if (window.Clerk.user) {
      window.location.href = '/Vineyard_1.3.html';
      return;
    }
    window.Clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
      afterSignInUrl: '/Vineyard_1.3.html',
      afterSignUpUrl: '/Vineyard_1.3.html',
      appearance: {
        variables: {
          colorPrimary: '#D44720',
          colorBackground: 'rgba(255,255,255,0.04)',
          colorText: '#F5EFE4',
          colorInputBackground: 'rgba(255,255,255,0.06)',
          colorInputText: '#F5EFE4',
          borderRadius: '10px',
          fontFamily: 'Barlow, sans-serif',
        }
      }
    });
  })();
</script>
</body>
</html>
