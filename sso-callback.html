  Completing sign-in…

  <script>
    const CLERK_PUBLISHABLE_KEY = 'pk_test_c21vb3RoLXN0YWxsaW9uLTkzLmNsZXJrLmFjY291bnRzLmRldiQ'; // same key as login.html

    async function handleCallback() {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
      script.setAttribute('data-clerk-publishable-key', CLERK_PUBLISHABLE_KEY);
      document.head.appendChild(script);
      await new Promise(resolve => script.onload = resolve);
      await window.Clerk.load();
      // Handle the OAuth callback — Clerk reads URL params automatically
      await window.Clerk.handleRedirectCallback();
    }

    handleCallback().catch(() => { window.location.href = '/login.html'; });
  </script>
